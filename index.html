<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
      }
      #game {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML = '<pre style="color:red;padding:20px;font-size:14px;background:#111;">'
          + e.message + '\n' + (e.filename || '') + ':' + e.lineno + ':' + e.colno
          + '\n\n' + (e.error && e.error.stack ? e.error.stack : '') + '</pre>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML = '<pre style="color:orange;padding:20px;font-size:14px;background:#111;">'
          + 'Unhandled rejection: ' + (e.reason && e.reason.stack ? e.reason.stack : e.reason) + '</pre>';
      });
    </script>
    <script type="module" src="/src/index.js"></script>
  </body>
</html>
